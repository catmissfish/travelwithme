<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Road Trip Routes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Cormorant+Garamond:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --book-width: 320px;
      --book-height: 420px;
      --page-color: #f5f7fb;
      --ink: #0f172a;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --accent-border: #bfdbfe;
      --bg-main: #e5edf8;
    }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, -apple-system-body, 'SF Pro Text',
        'SF Pro Display', sans-serif;
      background: radial-gradient(circle at top, #f5f7fb 0%, #e4ecfb 45%, #d5e4ff 100%);
      color: var(--ink);
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 40px 16px 56px;
      position: relative;
      overflow-x: hidden;
    }
    .bg-orb {
      position: fixed;
      border-radius: 999px;
      filter: blur(28px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.45;
      animation: orb-float 18s ease-in-out infinite alternate;
    }
    .bg-orb.one {
      width: 240px;
      height: 240px;
      left: -60px;
      top: 80px;
      background: radial-gradient(circle at 30% 30%, rgba(147,197,253,0.85), rgba(191,219,254,0.15));
    }
    .bg-orb.two {
      width: 280px;
      height: 280px;
      right: -80px;
      top: 200px;
      background: radial-gradient(circle at 30% 30%, rgba(186,230,253,0.85), rgba(191,219,254,0.12));
      animation-duration: 22s;
    }
    .bg-orb.three {
      width: 220px;
      height: 220px;
      right: 16%;
      bottom: 40px;
      background: radial-gradient(circle at 30% 30%, rgba(221,214,254,0.75), rgba(216,180,254,0.10));
      animation-duration: 20s;
    }
    @keyframes orb-float {
      0% { transform: translateY(0) translateX(0) scale(1); }
      100% { transform: translateY(-22px) translateX(10px) scale(1.04); }
    }
    .app-shell {
      width: 100%;
      max-width: 1120px;
      background: radial-gradient(circle at top left, rgba(255,255,255,0.96), rgba(246,249,255,0.98));
      border-radius: 28px;
      border: 1px solid rgba(148,163,184,0.25);
      box-shadow:
        0 28px 80px rgba(15,23,42,0.18),
        0 0 0 0.5px rgba(255,255,255,0.9) inset;
      backdrop-filter: blur(26px);
      padding: 28px 22px 30px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      position: relative;
      z-index: 1;
    }
    @media (min-width: 768px) {
      .app-shell { padding: 34px 40px 38px; }
    }
    .app-header {
      display: flex;
      flex-direction: column;
      gap: 18px;
      border-bottom: 1px solid rgba(226,232,240,0.9);
      padding-bottom: 18px;
    }
    .hero-video {
      position: relative;
      width: 100%;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(226,232,240,0.9);
      box-shadow:
        0 20px 50px rgba(15,23,42,0.18),
        0 0 0 0.5px rgba(255,255,255,0.9) inset;
      background: radial-gradient(circle at top left, #e5edff, #f5f7ff);
      aspect-ratio: 16 / 4.5;
    }
    .hero-video video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      transform-origin: center;
      transform: scale(1.01);
      filter: saturate(1.03) contrast(1.03);
      transition: transform 0.8s ease-out;
    }
    .hero-video::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(15,23,42,0.04), rgba(15,23,42,0.12));
      mix-blend-mode: soft-light;
      pointer-events: none;
    }
    .app-shell:hover .hero-video video {
      transform: scale(1.03);
    }
    .title-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .app-title {
      font-size: 1.6rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #020617;
      white-space: nowrap;
      font-weight: 500;
    }
    .app-subtitle {
      font-size: 0.98rem;
      color: rgba(71,85,105,0.9);
      letter-spacing: 0.04em;
    }
    .summary-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 18px;
      font-size: 0.82rem;
      color: rgba(100,116,139,0.95);
    }
    .summary-row span strong {
      color: #020617;
      font-weight: 500;
    }
    .search-bar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }
    @media (min-width: 700px) {
      .search-bar {
        flex-direction: row;
        align-items: center;
      }
    }
    .search-input-wrap {
      position: relative;
      flex: 1;
      min-width: 0;
    }
    .search-input-wrap input {
      width: 100%;
      padding: 11px 40px 11px 32px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.55);
      background: rgba(248,250,252,0.88);
      color: #020617;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.16s ease, box-shadow 0.18s ease, background 0.18s ease, transform 0.12s ease;
    }
    .search-input-wrap input::placeholder {
      color: rgba(148,163,184,0.95);
    }
    .search-input-wrap input:focus {
      border-color: rgba(37,99,235,0.98);
      box-shadow:
        0 0 0 1px rgba(59,130,246,0.9),
        0 10px 25px rgba(15,23,42,0.18);
      background: rgba(255,255,255,0.96);
      transform: translateY(-0.5px);
    }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.86rem;
      color: rgba(148,163,184,1);
      pointer-events: none;
    }
    .search-meta {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.78rem;
      color: rgba(148,163,184,0.95);
      pointer-events: none;
    }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 0.8rem;
    }
    .chip {
      padding: 5px 13px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.45);
      background: rgba(255,255,255,0.9);
      color: rgba(51,65,85,0.9);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.12s ease,
        box-shadow 0.15s ease;
    }
    .chip span.dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(59,130,246,0.95);
    }
    .chip.active {
      background: var(--accent-soft);
      color: #1e3a8a;
      border-color: rgba(59,130,246,0.95);
      box-shadow: 0 6px 16px rgba(59,130,246,0.16);
      transform: translateY(-0.5px);
    }
    .chip[data-filter="all"] {
      border-style: dashed;
    }
    .layout-main {
      margin-top: 12px;
    }
    .routes-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .routes-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      font-size: 0.9rem;
      color: rgba(71,85,105,0.95);
    }
    .routes-header strong {
      color: #0f172a;
    }
    .routes-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
      margin-top: 10px;
    }
    @media (min-width: 768px) {
      .routes-list {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    .route-card {
      position: relative;
      border-radius: 24px;
      padding: 0 0 20px;
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(226,232,240,0.9);
      box-shadow:
        0 18px 40px rgba(15,23,42,0.10),
        0 1px 0 rgba(255,255,255,0.9) inset;
      cursor: default;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border 0.18s ease, background 0.18s ease;
      opacity: 0;
      transform: translateY(10px);
      animation: card-in 0.45s cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
    }
    .route-card:hover {
      transform: translateY(-5px);
      box-shadow:
        0 26px 70px rgba(15,23,42,0.20),
        0 0 0 0.5px rgba(191,219,254,0.9);
      border-color: rgba(191,219,254,1);
      background: rgba(255,255,255,0.98);
    }
    @keyframes card-in {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .route-media {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background:
        radial-gradient(circle at 0% 0%, rgba(191,219,254,1), rgba(125,211,252,0.9)),
        linear-gradient(135deg, #dbeafe, #eff6ff);
    }
    .route-media img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.02) contrast(1.03);
      transition: transform 0.35s ease;
    }
    .route-card:hover .route-media img {
      transform: scale(1.04);
    }
    .route-media::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(2,6,23,0.00) 0%, rgba(2,6,23,0.14) 65%, rgba(2,6,23,0.22) 100%);
      pointer-events: none;
    }
    .route-inner {
      padding: 16px 18px 12px;
    }
    .route-main {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .route-title {
      font-size: 1rem;
      color: #020617;
      letter-spacing: 0.02em;
    }
    .route-sub {
      font-size: 0.82rem;
      color: rgba(71,85,105,0.95);
    }
    .route-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 4px 14px;
      font-size: 0.8rem;
      color: rgba(100,116,139,0.95);
      margin-top: 14px;
    }
    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0;
      border-radius: 0;
      background: transparent;
      border: none;
    }
    .meta-pill span.label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: rgba(148,163,184,0.9);
    }
    .meta-pill span.value {
      font-variant-numeric: tabular-nums;
      color: #020617;
      font-weight: 500;
    }
    .route-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 10px;
      margin-top: 18px;
      padding-top: 10px;
      border-top: 1px solid rgba(226,232,240,0.9);
      font-size: 0.72rem;
    }
    .route-tag {
      padding: 4px 10px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid rgba(191,219,254,0.9);
      letter-spacing: 0.02em;
    }
    .route-date {
      position: absolute;
      right: 12px;
      top: 10px;
      font-size: 0.72rem;
      color: rgba(100,116,139,0.95);
    }
    .empty-state {
      font-size: 0.86rem;
      color: rgba(245,236,216,0.7);
      padding: 16px 10px 8px;
    }
    .route-card.clickable { cursor: pointer; }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.55);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 50;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      width: min(980px, 100%);
      max-height: min(86vh, 920px);
      overflow: auto;
      border-radius: 16px;
      border: 1px solid rgba(191,219,254,0.9);
      background: radial-gradient(circle at top left, #eff6ff, #e0ecff);
      box-shadow: 0 22px 60px rgba(15,23,42,0.65);
      color: #0f172a;
    }
    .modal-media {
      margin: 12px 16px 0;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(191,219,254,0.9);
      background: #ffffff;
      box-shadow: 0 14px 34px rgba(15,23,42,0.12);
    }
    .modal-media img {
      display: block;
      width: 100%;
      height: auto;
    }
    .modal-actions {
      margin: 10px 16px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }
    .modal-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,0.6);
      background: rgba(255,255,255,0.92);
      color: rgba(30,64,175,1);
      text-decoration: none;
      font-size: 0.86rem;
      box-shadow: 0 10px 24px rgba(15,23,42,0.10);
      transition: transform 0.12s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      white-space: nowrap;
    }
    .modal-link:hover {
      transform: translateY(-0.5px);
      border-color: rgba(59,130,246,0.95);
      box-shadow: 0 14px 30px rgba(15,23,42,0.14);
      background: rgba(239,246,255,0.95);
    }
    .budget-card {
      margin: 8px 16px 2px;
      display: grid;
      gap: 8px;
    }
    .budget-head {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }
    .budget-head-right {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .budget-title {
      font-size: 0.9rem;
      color: #0f172a;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .budget-toggle {
      border: 1px solid rgba(148,163,184,0.65);
      background: rgba(255,255,255,0.92);
      color: #1e3a8a;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.78rem;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(15,23,42,0.08);
    }
    .budget-toggle-hint {
      font-size: 0.74rem;
      color: rgba(100,116,139,0.95);
      line-height: 1.4;
      white-space: nowrap;
    }
    .budget-content {
      display: grid;
      gap: 10px;
      border: 1px solid rgba(191,219,254,0.9);
      border-radius: 14px;
      background: rgba(255,255,255,0.96);
      box-shadow: 0 12px 28px rgba(15,23,42,0.10);
      padding: 12px;
      max-height: 0;
      opacity: 0;
      overflow: hidden;
      transform: translateY(-6px);
      transition: max-height 0.28s ease, opacity 0.22s ease, transform 0.22s ease, padding 0.22s ease;
    }
    .budget-card.expanded .budget-content {
      max-height: 1400px;
      opacity: 1;
      transform: translateY(0);
    }
    .budget-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(1, minmax(0, 1fr));
    }
    @media (min-width: 860px) {
      .budget-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    .budget-field {
      display: grid;
      gap: 4px;
    }
    .budget-field label {
      font-size: 0.76rem;
      color: rgba(71,85,105,0.95);
    }
    .budget-field input {
      width: 100%;
      border: 1px solid rgba(148,163,184,0.55);
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.84rem;
      color: #0f172a;
      background: rgba(248,250,252,0.95);
      outline: none;
    }
    .budget-field input:focus {
      border-color: rgba(59,130,246,0.95);
      box-shadow: 0 0 0 1px rgba(59,130,246,0.9);
      background: #fff;
    }
    .budget-links {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .budget-link {
      font-size: 0.76rem;
      padding: 5px 9px;
      border-radius: 999px;
      text-decoration: none;
      border: 1px solid rgba(191,219,254,0.95);
      background: rgba(239,246,255,0.95);
      color: rgba(30,64,175,0.98);
    }
    .budget-hotel-list {
      display: grid;
      gap: 6px;
      border-top: 1px dashed rgba(148,163,184,0.45);
      padding-top: 8px;
    }
    .budget-hotel-row {
      display: grid;
      gap: 6px;
      grid-template-columns: 1.8fr 0.8fr 1fr;
      align-items: center;
    }
    .budget-hotel-row .hotel-name {
      font-size: 0.78rem;
      color: rgba(30,41,59,0.95);
      line-height: 1.4;
    }
    .budget-hotel-row .nights {
      font-size: 0.76rem;
      color: rgba(100,116,139,0.95);
      text-align: center;
    }
    .budget-hotel-row input {
      width: 100%;
      border: 1px solid rgba(148,163,184,0.55);
      border-radius: 9px;
      padding: 7px 8px;
      font-size: 0.8rem;
      background: rgba(248,250,252,0.95);
      color: #0f172a;
      outline: none;
    }
    .budget-summary {
      border-top: 1px dashed rgba(148,163,184,0.45);
      padding-top: 10px;
      display: grid;
      gap: 5px;
      font-size: 0.8rem;
      color: rgba(51,65,85,0.95);
    }
    .budget-summary .total {
      font-size: 0.92rem;
      font-weight: 700;
      color: #0f172a;
    }
    .budget-snapshot {
      border-top: 1px dashed rgba(148,163,184,0.45);
      padding-top: 8px;
      display: grid;
      gap: 8px;
    }
    .budget-snapshot-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .budget-btn {
      border: 1px solid rgba(148,163,184,0.65);
      background: rgba(255,255,255,0.92);
      color: #1e3a8a;
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 0.78rem;
      cursor: pointer;
    }
    .budget-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .budget-note {
      font-size: 0.75rem;
      color: rgba(100,116,139,0.95);
      line-height: 1.5;
    }
    .modal-header {
      position: sticky;
      top: 0;
      background: linear-gradient(180deg, rgba(239,246,255,0.96), rgba(219,234,254,0.9));
      border-bottom: 1px dashed rgba(148,163,184,0.5);
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .modal-title {
      font-size: 1rem;
      color: #0f172a;
    }
    .modal-subtitle {
      font-size: 0.82rem;
      color: rgba(71,85,105,0.95);
      margin-top: 4px;
      line-height: 1.5;
    }
    .modal-close {
      border: 1px solid rgba(148,163,184,0.6);
      background: rgba(255,255,255,0.9);
      color: rgba(30,64,175,1);
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      transition: border 0.15s ease, background 0.15s ease;
      white-space: nowrap;
    }
    .modal-close:hover {
      border-color: rgba(59,130,246,0.95);
      background: rgba(219,234,254,0.9);
    }
    .itinerary {
      padding: 14px 18px 20px;
      display: grid;
      gap: 16px;
    }
    .day-item {
      border: 1px solid rgba(209,213,219,0.9);
      background: rgba(255,255,255,0.95);
      border-radius: 14px;
      padding: 16px 16px 14px;
      box-shadow: 0 8px 20px rgba(15,23,42,0.06);
      position: relative;
      padding-left: 24px;
    }
    .day-item::before {
      content: '';
      position: absolute;
      left: 10px;
      top: 14px;
      bottom: 14px;
      width: 2px;
      background: linear-gradient(180deg, rgba(96,165,250,0.85), rgba(191,219,254,0.35));
      border-radius: 999px;
    }
    .day-item::after {
      content: '';
      position: absolute;
      left: 6px;
      top: 18px;
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #60a5fa;
      box-shadow: 0 0 0 3px rgba(219,234,254,0.85);
    }
    .day-photo {
      margin-top: 8px;
      margin-bottom: 10px;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(226,232,240,0.9);
      background: rgba(255,255,255,0.8);
      box-shadow: 0 10px 26px rgba(15,23,42,0.06);
      position: relative;
      aspect-ratio: 16 / 2.3;
      max-height: 110px;
    }
    .day-photo img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      aspect-ratio: auto;
    }
    .day-photo-skeleton {
      width: 100%;
      aspect-ratio: 16 / 2.3;

      function formatDate(d) {
        if (!d) return '-';
        var parsed = new Date(d + 'T00:00:00');
        if (isNaN(parsed.getTime())) return d;
        try {
          return new Intl.DateTimeFormat('en-US', { year: 'numeric', month: 'short', day: '2-digit' }).format(parsed);
        } catch (e) {
          return d;
        }
      }

      function initSummary() {
        totalRoutes.textContent = routes.length;
        if (!routes.length) {
          latestDate.textContent = '-';
          return;
        }
        var sorted = routes
          .slice()
          .filter(function(r) { return !!r.date; })
          .sort(function(a, b) {
            return (b.date || '').localeCompare(a.date || '');
          });
        latestDate.textContent = sorted.length ? formatDate(sorted[0].date) : '-';
      }

      function renderRoutes() {
        var keyword = (searchInput.value || '').trim().toLowerCase();
        var activeFilter = filterRow.querySelector('.chip.active')?.getAttribute('data-filter') || 'all';

        var filtered = routes.filter(function(r) {
          if (activeFilter !== 'all' && r.type !== activeFilter) return false;

          if (!keyword) return true;
          var haystack = [
            r.title,
            r.from,
            r.to,
            (r.id || ''),
            (r.note || ''),
            (r.tags || []).join(' ')
          ].join(' ').toLowerCase();
          return haystack.indexOf(keyword) !== -1;

      function uniqConsecutive(arr) {
        var out = [];
        for (var i = 0; i < arr.length; i++) {
          var v = (arr[i] || '').trim();
          if (!v) continue;
          if (!out.length || out[out.length - 1] !== v) out.push(v);
        }
        return out;
      }

      function getStopsForRoute(route) {
        if (!route) return [];
        if (route.id === 'R-2024-05-DE') {
          return uniqConsecutive([
            'Frankfurt',
            'Stuttgart',
            'Freudenstadt (Black Forest)',
            'Konstanz',
            'Füssen',
            'Munich',
            'Rothenburg ob der Tauber',
            'Frankfurt'
          ]);
        }
        if (route.itinerary && route.itinerary.length) {
          var cities = route.itinerary.map(function(d) {
            var hotelName = (d.hotel || '').trim();
            if (!hotelName || hotelName === '—') return '';
            return d.city || '';
          });
          var uniq = uniqConsecutive(cities).filter(Boolean);
          if (uniq.length >= 2) return uniq;
        }
        var basic = [];
        if (route.from) basic.push(route.from);
        if (route.to) basic.push(route.to);
        return uniqConsecutive(basic);
      }

      function buildGoogleDirectionsUrl(stops) {
        if (!stops || stops.length < 2) return '';
        var origin = stops[0];
        var destination = stops[stops.length - 1];
        var waypoints = stops.slice(1, -1);
        var url =
          'https://www.google.com/maps/dir/?api=1' +
          '&travelmode=driving' +
          '&origin=' + encodeURIComponent(origin) +
          '&destination=' + encodeURIComponent(destination);
        if (waypoints.length) {
          url += '&waypoints=' + encodeURIComponent(waypoints.join('|'));
        }
        return url;
      }

      function buildGoogleStaticMapUrl(stops) {
        if (!stops || stops.length < 2) return '';
        // Google Static Maps typically requires a key. Leave empty and fill later to enable.
        var size = '1200x675';
        var scale = 2;
        var path = 'weight:5|color:0x2563EBff|' + stops.join('|');
        var markers = [
          'color:0x2563EB|label:S|' + stops[0],
          'color:0x2563EB|label:E|' + stops[stops.length - 1]
        ];
        for (var i = 1; i < stops.length - 1; i++) {
          markers.push('color:0x60A5FA|' + stops[i]);
        }
        var url =
          'https://maps.googleapis.com/maps/api/staticmap' +
          '?size=' + encodeURIComponent(size) +
          '&scale=' + encodeURIComponent(String(scale)) +
          '&maptype=roadmap' +
          '&format=png' +
          '&path=' + encodeURIComponent(path);
        markers.forEach(function(m) {
          url += '&markers=' + encodeURIComponent(m);
        });
        if (googleMapsApiKey) {
          url += '&key=' + encodeURIComponent(googleMapsApiKey);
        }
        return url;
      }

            function isTransitLine(txt) {
              var t = (txt || '').trim();
              if (!t) return true;
              var lower = t.toLowerCase();
              if (lower.indexOf('flight') !== -1) return true;
              if (lower.indexOf('pick up') !== -1) return true;

            function extractAttraction(items) {

              });
              return best || firstNonTransit || '';

              img2.src = fallbackUrl;
              img2.addEventListener('load', function() {

                  localStorage.setItem(cacheKey, img2.currentSrc || img2.src);
                } catch (e) {}
                skeleton.remove();
                img2.style.display = 'block';
              }, { once: true });
              img2.addEventListener('error', function() {

        function parseNum(v) {

          }
        }

        function estimateFlightOneWay(origin, routeObj) {
          var o = (origin || '').toLowerCase();
          var tags = (routeObj.tags || []).join(' ').toLowerCase();
          var isChinaOrigin = /(hangzhou|shanghai|beijing|guangzhou|shenzhen|china|中国|杭州|上海|北京|广州|深圳)/i.test(o);
          if (!isChinaOrigin) return 1800;
          if (tags.indexOf('australia') !== -1) return 3200;
          if (tags.indexOf('new zealand') !== -1) return 3600;
          if (tags.indexOf('norway') !== -1) return 4300;
          if (tags.indexOf('switzerland') !== -1) return 4200;
          if (tags.indexOf('germany') !== -1) return 3900;
          if (tags.indexOf('europe') !== -1) return 4000;
          return 2500;
        }

        function monthSeasonFactor(mk) {
          // Baseline by month (using the 1st day snapshot concept).
          var m = Number((mk || '').split('-')[1] || 0);
          if (!m) return 1;
          // Higher in summer + major holiday windows, lower in shoulder seasons.
          var table = {
            1: 1.22,
            2: 1.06,
            3: 0.94,
            4: 0.97,
            5: 1.05,
            6: 1.13,
            7: 1.26,
            8: 1.24,
            9: 1.08,
            10: 1.03,
            11: 0.91,
            12: 1.18
          };
          return table[m] || 1;
        }

        function routeMonthNoise(routeId, mk) {
          // Deterministic tiny offset so different routes/months don't look identical.
          var s = String(routeId || '') + '|' + String(mk || '');
          var hash = 0;
          for (var i = 0; i < s.length; i++) hash = ((hash << 5) - hash) + s.charCodeAt(i);
          var n = Math.abs(hash % 9); // 0..8
          return 0.96 + n * 0.01;     // 0.96 .. 1.04
        }

        function estimateHotelPerNight(stay, routeObj) {
          var hotelText = ((stay.hotel || '') + ' ' + (stay.city || '')).toLowerCase();
          var tags = (routeObj.tags || []).join(' ').toLowerCase();
          var base = 800;
          if (tags.indexOf('australia') !== -1) base = 1100;
          else if (tags.indexOf('new zealand') !== -1) base = 950;
          else if (tags.indexOf('norway') !== -1) base = 1400;
          else if (tags.indexOf('switzerland') !== -1) base = 1300;
          else if (tags.indexOf('germany') !== -1) base = 950;
          else if (tags.indexOf('europe') !== -1) base = 1100;

          if (/oslo|zurich|munich|sydney|queenstown|copenhagen|frankfurt/i.test(hotelText)) base += 250;
          if (/airbnb|ferry|cabin/i.test(hotelText)) base -= 120;
          if (/hyatt|radisson|marriott|sheraton|alexandra/i.test(hotelText)) base += 200;
          return Math.max(450, Math.round(base / 10) * 10);
        }

        function autoFetchMonthlyBaseline(mk) {
          if (loadingSnapshotByMonth[mk]) return;
          if (getSavedSnapshot(mk)) return;
          loadingSnapshotByMonth[mk] = true;
          setEstimateLoading(true);
          setSnapshotNote('No monthly baseline for ' + mk + '. Fetching now...');

          setTimeout(function() {
            var origin = (originInput.value || '').trim();
            var seasonFactor = monthSeasonFactor(mk) * routeMonthNoise(route.id || 'route', mk);
            var oneWay = Math.round(estimateFlightOneWay(origin, route) * seasonFactor / 10) * 10;
            var payload = {
              origin: origin,
              departDate: mk + '-01',
              outbound: oneWay,
              inbound: oneWay,
              hotels: stays.map(function(stay) {
                var hotel = Math.round(estimateHotelPerNight(stay, route) * seasonFactor / 10) * 10;
                return {
                  hotel: stay.hotel,
                  perNight: hotel
                };
              }),
              updatedAt: new Date().toISOString(),
              source: 'monthly-baseline-auto'
            };
            try {
              localStorage.setItem(snapshotStorageKey(route.id || 'route', mk), JSON.stringify(payload));
            } catch (e) {
              setSnapshotNote('Failed to save fetched monthly baseline.');
            }

            if (selectedMonthKey() === mk) {
              applySnapshot(payload);
            }
            loadingSnapshotByMonth[mk] = false;
            setEstimateLoading(false);
            refreshSnapshotNote();
            setSnapshotNote('Monthly baseline fetched for ' + mk + ' and applied.');
          }, 1100);
        }

        function refreshSnapshotNote() {
          var mk = selectedMonthKey();
          var snap = getSavedSnapshot(mk);
          if (snap) {
            var time = snap.updatedAt ? new Date(snap.updatedAt).toLocaleString() : 'unknown';
            setSnapshotNote(
              'Monthly snapshot (' + mk + ') loaded. Last updated: ' + time +
              '. Data remains fixed for this month.'
            );
          } else {
            setSnapshotNote(
              'No snapshot for ' + mk + '. It will auto-fetch baseline when date is selected.'
            );
          }
        }

        function rebuildLinks() {
          links.innerHTML = '';
          var origin = (originInput.value || '').trim();
          var depDate = departDateInput.value || '';
          var starts = getStopsForRoute(route);
          var tripStart = starts.length ? starts[0] : (route.from || '');
          var tripEnd = starts.length ? starts[starts.length - 1] : (route.to || '');
          if (origin && tripStart && depDate) {
            var outDate = depDate;
            var inDate = addDays(depDate, Number(route.days || 0));
            var gfOut = document.createElement('a');
            gfOut.className = 'budget-link';
            gfOut.target = '_blank';
            gfOut.rel = 'noopener noreferrer';
            gfOut.textContent = 'Search outbound flight (Google Flights)';
            gfOut.href =
              'https://www.google.com/travel/flights?hl=en#flt=' +
              encodeURIComponent(origin) + '.' + encodeURIComponent(tripStart) + '.' + outDate;
            links.appendChild(gfOut);

            var gfIn = document.createElement('a');
            gfIn.className = 'budget-link';
            gfIn.target = '_blank';
            gfIn.rel = 'noopener noreferrer';
            gfIn.textContent = 'Search return flight (Google Flights)';
            gfIn.href =
              'https://www.google.com/travel/flights?hl=en#flt=' +
              encodeURIComponent(tripEnd) + '.' + encodeURIComponent(origin) + '.' + inDate;
            links.appendChild(gfIn);
          }
        }

        function recalcBudget() {
          var flightTotal = parseNum(outboundInput.value) + parseNum(returnInput.value);
          var hotelTotal = hotelInputs.reduce(function(sum, h) {
            return sum + parseNum(h.input.value) * h.nights;
          }, 0);
          var grand = flightTotal + hotelTotal;
          flightTotalEl.textContent = String(Math.round(flightTotal));
          hotelTotalEl.textContent = String(Math.round(hotelTotal));
          grandTotalEl.textContent = String(Math.round(grand));
        }

        originInput.addEventListener('input', function() {
          rebuildLinks();
        });
        departDateInput.addEventListener('input', function() {
          rebuildLinks();
          var mk = selectedMonthKey();
          if (!getSavedSnapshot(mk)) {
            autoFetchMonthlyBaseline(mk);
          } else {
            var snap = getSavedSnapshot(mk);
            if (snap) applySnapshot(snap);
            refreshSnapshotNote();
          }
        });
        [outboundInput, returnInput].forEach(function(el) {
          el.addEventListener('input', recalcBudget);
        });
        hotelInputs.forEach(function(h) {
          h.input.addEventListener('input', recalcBudget);
        });

        rebuildLinks();
        recalcBudget();
        var initialMk = selectedMonthKey();
        var initialSnapshot = getSavedSnapshot(initialMk);
        if (initialSnapshot) applySnapshot(initialSnapshot);
        refreshSnapshotNote();

        toggleBtn.addEventListener('click', function() {
          var expanded = card.classList.toggle('expanded');
          toggleBtn.textContent = expanded ? 'Hide estimator' : 'Estimate budget';
        });

        return card;
      }

      function closeItinerary() {
        itineraryOverlay.classList.remove('active');
        itineraryOverlay.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
      }

      routesList.addEventListener('click', function(e) {
        var card = e.target.closest('.route-card');
        if (!card) return;
        var id = card.dataset.routeId;
        if (!id) return;
        var route = routes.find(function(r) { return r.id === id; });
        if (route && route.itinerary && route.itinerary.length) {
          openItinerary(route);
        }
      });

      itineraryClose.addEventListener('click', function() {
        closeItinerary();
      });
      itineraryOverlay.addEventListener('click', function(e) {
        if (e.target === itineraryOverlay) closeItinerary();
      });
      window.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && itineraryOverlay.classList.contains('active')) closeItinerary();
      });

      searchInput.addEventListener('input', function() {
        renderRoutes();
      });

      filterRow.addEventListener('click', function(e) {
        var target = e.target.closest('.chip');
        if (!target) return;
        filterRow.querySelectorAll('.chip').forEach(function(btn) {
          btn.classList.toggle('active', btn === target);
        });
        renderRoutes();
      });

      initSummary();
      renderRoutes();

      // hero video playlist (two-part loop)
      if (heroVideo) {
        (function() {
          // two-part hero video playlist
          var sources = ['jm1.mp4', 'jm3.mp4', 'jm2.mp4'];
          var idx = 0;

          function playCurrent() {
            var src = sources[idx];
            heroVideo.src = src;
            // Default framing
            heroVideo.style.objectPosition = 'center center';
            // For jm3, bias viewport towards lower half but not all the way down
            if (src.indexOf('jm3') !== -1) {
              heroVideo.style.objectPosition = 'center 60%';
            }
            heroVideo.play().catch(function() {});
          }

          heroVideo.addEventListener('ended', function() {
            idx = (idx + 1) % sources.length;
            playCurrent();
          });

          playCurrent();
        })();
      }
    })();
  </script>
</body>
</html>
