<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自驾游路线记录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Cormorant+Garamond:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --book-width: 320px;
      --book-height: 420px;
      --page-color: #f5f7fb;
      --ink: #0f172a;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --accent-border: #bfdbfe;
      --bg-main: #e5edf8;
    }
    body {
      min-height: 100vh;
      font-family: 'Noto Serif SC', 'Cormorant Garamond', serif;
      background: radial-gradient(circle at top, #eff5ff 0%, #dbeafe 45%, #bfdbfe 100%);
      color: var(--ink);
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 32px 16px 40px;
    }
    .app-shell {
      width: 100%;
      max-width: 1120px;
      background: rgba(255,255,255,0.88);
      border-radius: 18px;
      border: 1px solid rgba(148,163,184,0.35);
      box-shadow: 0 20px 60px rgba(15,23,42,0.25);
      backdrop-filter: blur(16px);
      padding: 24px 24px 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    @media (min-width: 768px) {
      .app-shell { padding: 28px 32px 32px; }
    }
    .app-header {
      display: flex;
      flex-direction: column;
      gap: 16px;
      border-bottom: 1px dashed rgba(148,163,184,0.6);
      padding-bottom: 16px;
    }
    .title-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .app-title {
      font-size: 1.4rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #0f172a;
      white-space: nowrap;
    }
    .app-subtitle {
      font-size: 0.9rem;
      color: rgba(51,65,85,0.85);
    }
    .summary-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 18px;
      font-size: 0.86rem;
      color: rgba(100,116,139,0.9);
    }
    .summary-row span strong {
      color: #0f172a;
      font-weight: 600;
    }
    .search-bar {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 6px;
    }
    @media (min-width: 700px) {
      .search-bar {
        flex-direction: row;
        align-items: center;
      }
    }
    .search-input-wrap {
      position: relative;
      flex: 1;
      min-width: 0;
    }
    .search-input-wrap input {
      width: 100%;
      padding: 10px 40px 10px 30px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.55);
      background: radial-gradient(circle at top left, #eff6ff, #dbeafe);
      color: #0f172a;
      font-size: 0.94rem;
      outline: none;
      transition: border 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    .search-input-wrap input::placeholder {
      color: rgba(148,163,184,0.9);
    }
    .search-input-wrap input:focus {
      border-color: rgba(59,130,246,0.95);
      box-shadow: 0 0 0 1px rgba(59,130,246,0.95);
      background: radial-gradient(circle at top left, #eff6ff, #bfdbfe);
    }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.9rem;
      color: rgba(245,236,216,0.58);
      pointer-events: none;
    }
    .search-meta {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.78rem;
      color: rgba(245,236,216,0.46);
      pointer-events: none;
    }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 0.8rem;
    }
    .chip {
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.55);
      background: rgba(255,255,255,0.65);
      color: rgba(51,65,85,0.9);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: all 0.15s ease;
    }
    .chip span.dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(59,130,246,0.95);
    }
    .chip.active {
      background: var(--accent-soft);
      color: #1e3a8a;
      border-color: rgba(59,130,246,0.95);
    }
    .chip[data-filter="all"] {
      border-style: dashed;
    }
    .layout-main {
      margin-top: 4px;
    }
    .routes-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .routes-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      font-size: 0.9rem;
      color: rgba(71,85,105,0.95);
    }
    .routes-header strong {
      color: #0f172a;
    }
    .routes-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }
    .route-card {
      position: relative;
      border-radius: 18px;
      padding: 0 0 14px;
      background: #ffffff;
      border: 1px solid rgba(148,163,184,0.4);
      box-shadow: 0 18px 40px rgba(15,23,42,0.18);
      cursor: default;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border 0.18s ease;
    }
    .route-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 22px 50px rgba(15,23,42,0.28);
      border-color: rgba(59,130,246,0.9);
    }
    .route-card::before {
      content: '';
      display: block;
      width: 100%;
      aspect-ratio: 3 / 1.4;
      background: radial-gradient(circle at 0% 0%, #bfdbfe, #60a5fa);
    }
    .route-inner {
      padding: 12px 14px 10px;
    }
    .route-main {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .route-title {
      font-size: 1rem;
      color: #0f172a;
    }
    .route-sub {
      font-size: 0.82rem;
      color: rgba(71,85,105,0.95);
    }
    .route-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      font-size: 0.8rem;
      color: rgba(71,85,105,0.95);
    }
    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(239,246,255,0.9);
      border: 1px solid rgba(191,219,254,0.9);
    }
    .meta-pill span.label {
      color: rgba(100,116,139,0.9);
    }
    .meta-pill span.value {
      color: #0f172a;
    }
    .route-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 2px;
      font-size: 0.74rem;
    }
    .route-tag {
      padding: 2px 7px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid rgba(191,219,254,0.9);
    }
    .route-date {
      position: absolute;
      right: 12px;
      top: 10px;
      font-size: 0.72rem;
      color: rgba(100,116,139,0.95);
    }
    .empty-state {
      font-size: 0.86rem;
      color: rgba(245,236,216,0.7);
      padding: 16px 10px 8px;
    }
    .route-card.clickable { cursor: pointer; }
    .route-card.clickable::after {
      content: '查看行程';
      position: absolute;
      right: 12px;
      bottom: 10px;
      font-size: 0.74rem;
      color: rgba(37,99,235,0.9);
      border: 1px solid rgba(191,219,254,0.9);
      background: rgba(239,246,255,0.9);
      padding: 3px 8px;
      border-radius: 999px;
    }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.55);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 50;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      width: min(980px, 100%);
      max-height: min(86vh, 920px);
      overflow: auto;
      border-radius: 16px;
      border: 1px solid rgba(191,219,254,0.9);
      background: radial-gradient(circle at top left, #eff6ff, #e0ecff);
      box-shadow: 0 22px 60px rgba(15,23,42,0.65);
      color: #0f172a;
    }
    .modal-header {
      position: sticky;
      top: 0;
      background: linear-gradient(180deg, rgba(239,246,255,0.96), rgba(219,234,254,0.9));
      border-bottom: 1px dashed rgba(148,163,184,0.5);
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .modal-title {
      font-size: 1rem;
      color: #0f172a;
    }
    .modal-subtitle {
      font-size: 0.82rem;
      color: rgba(71,85,105,0.95);
      margin-top: 4px;
      line-height: 1.5;
    }
    .modal-close {
      border: 1px solid rgba(148,163,184,0.6);
      background: rgba(255,255,255,0.9);
      color: rgba(30,64,175,1);
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      transition: border 0.15s ease, background 0.15s ease;
      white-space: nowrap;
    }
    .modal-close:hover {
      border-color: rgba(59,130,246,0.95);
      background: rgba(219,234,254,0.9);
    }
    .itinerary {
      padding: 10px 16px 16px;
      display: grid;
      gap: 10px;
    }
    .day-item {
      border: 1px solid rgba(209,213,219,0.9);
      background: rgba(255,255,255,0.95);
      border-radius: 14px;
      padding: 12px 12px 10px;
    }
    .day-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .day-date {
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
      color: #0f172a;
      font-size: 0.92rem;
    }
    .day-city {
      color: rgba(71,85,105,0.95);
      font-size: 0.82rem;
    }
    .day-hotel {
      font-size: 0.82rem;
      color: rgba(15,23,42,0.95);
    }
    .day-hotel strong { color: rgba(215,178,130,0.95); }
    .day-list {
      margin-top: 6px;
      padding-left: 18px;
      color: rgba(245,236,216,0.78);
      line-height: 1.6;
      font-size: 0.84rem;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="title-row">
        <div class="app-title">ROAD · NOTES</div>
        <div class="app-subtitle">自驾游路线小册 · 记录每一段在路上的风景</div>
      </div>
      <div class="summary-row">
        <span>目前共记录 <strong id="totalRoutes">0</strong> 条路线</span>
        <span>最近出发时间：<strong id="latestDate">-</strong></span>
      </div>
      <div class="search-bar">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input id="searchInput" type="search" placeholder="按目的地 / 出发地 / 关键字搜索，例如：挪威、布里斯班、基督城" autocomplete="off">
          <span class="search-meta" id="matchCount">全部路线</span>
        </div>
        <div class="filter-row" id="filterRow">
          <button class="chip active" data-filter="all"><span class="dot"></span>全部</button>
          <button class="chip" data-filter="weekend">中国</button>
          <button class="chip" data-filter="long">欧洲</button>
          <button class="chip" data-filter="mountain">澳洲</button>
          <button class="chip" data-filter="sea">新西兰</button>
        </div>
      </div>
    </header>

    <main class="layout-main">
      <section class="routes-panel" aria-label="自驾游路线列表">
        <div class="routes-header">
          <span><strong>路线列表</strong> · 点击下方卡片即可快速浏览关键信息</span>
        </div>
        <div id="routesList" class="routes-list"></div>
        <div id="emptyState" class="empty-state" style="display:none;">没有匹配的路线，可以尝试换个关键词，或者稍后补充新的行程记录。</div>
      </section>
    </main>
  </div>

  <div class="modal-overlay" id="itineraryOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="itineraryTitle">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="itineraryTitle">行程</div>
          <div class="modal-subtitle" id="itinerarySubtitle"></div>
        </div>
        <button class="modal-close" type="button" id="itineraryClose">关闭</button>
      </div>
      <div class="itinerary" id="itineraryBody"></div>
    </div>
  </div>

  <script>
    (function() {
      // 在这里维护你的自驾游路线数据
      var routes = [
        {
          id: 'R-001',
          title: '沪 — 舟山东海看海两日',
          from: '上海',
          to: '舟山朱家尖 · 东沙',
          days: 2,
          distance: 520,
          date: '2025-09-30',
          type: 'weekend',
          tags: ['看海', '跨海大桥', '海鲜'],
          note: '沿沈海高速+舟山跨海大桥，适合周末放空。'
        },
        {
          id: 'R-002',
          title: '川西小环线 · 秋色之旅',
          from: '成都',
          to: '新都桥 · 塔公草原 · 海螺沟',
          days: 6,
          distance: 1350,
          date: '2024-10-12',
          type: 'mountain',
          tags: ['川西', '高原', '山路', '摄影'],
          note: '高海拔路段较多，适合秋季看彩林和银河。'
        },
        {
          id: 'R-003',
          title: '环青海湖+茶卡 · 高原自驾',
          from: '西宁',
          to: '青海湖 · 茶卡盐湖',
          days: 4,
          distance: 780,
          date: '2023-08-05',
          type: 'long',
          tags: ['湖泊', '高原', '环线'],
          note: '适合夏季，注意防晒和昼夜温差。'
        },
        {
          id: 'R-004',
          title: '厦门 — 漳州东山岛海边露营',
          from: '厦门',
          to: '漳州东山岛',
          days: 3,
          distance: 410,
          date: '2022-05-01',
          type: 'sea',
          tags: ['看海', '露营', '海岛'],
          note: '沿海 小众海滩较多，适合露营和拍照。'
        },
        {
          id: 'R-2025-01-AU',
          title: 'Australia 2025.01 · Brisbane → Sydney 海岸线自驾',
          from: 'Brisbane',
          to: 'Sydney',
          days: 9,
          distance: 0,
          date: '2025-01-31',
          type: 'mountain',
          tags: ['Australia', 'Queensland', 'NSW', '自驾', '海岸线'],
          note: '按 PDF 整理：时间 / City / Hotel（可点击查看完整行程）。',
          itinerary: [
            {
              date: '2025-01-31',
              city: 'Brisbane',
              hotel: 'Hilton Brisbane',
              items: [
                '航班：Hangzhou → Brisbane（HGH-CAN CZ3512；CAN-BNE CZ381），08:30 抵达',
                '机场取车',
                'Story Bridge',
                'South Bank Parklands'
              ]
            },
            {
              date: '2025-02-01',
              city: 'Gold Coast',
              hotel: 'Meriton Suites Surfers Paradise',
              items: [
                'The University of Queensland',
                'Mount Cook（按原 PDF 记录）'
              ]
            },
            {
              date: '2025-02-02',
              city: 'Gold Coast',
              hotel: 'Meriton Suites Surfers Paradise',
              items: [
                'Brisbane → Gold Coast（约 1h）',
                'Surfers Paradise'
              ]
            },
            {
              date: '2025-02-03',
              city: 'Byron Bay',
              hotel: 'Byron Bay',
              items: [
                'Gold Coast → Byron Bay（约 1h）',
                'Byron Beach',
                'Cape Byron Lighthouse'
              ]
            },
            {
              date: '2025-02-04',
              city: 'Port Macquarie',
              hotel: 'Sails Port Macquarie (EVT hotel)',
              items: [
                'Byron Bay → Coffs Harbour（约 2.5h）',
                'The Big Banana Fun Park、Sealy Lookout',
                'Coffs Harbour → Port Macquarie（约 2h）'
              ]
            },
            {
              date: '2025-02-05',
              city: 'Port Stephens',
              hotel: 'Anchorage Port Stephens',
              items: [
                'Lighthouse Beach',
                'Koala Hospital、Town Beach',
                'Tracking Point Lighthouse'
              ]
            },
            {
              date: '2025-02-06',
              city: 'Sydney',
              hotel: 'Sheraton Grand Sydney Hyde Park',
              items: [
                'Port Macquarie → Newcastle（约 2h）',
                'Tomaree Head Summit Walk、Memorial Walk',
                'Newcastle → Sydney（约 2.5h）'
              ]
            },
            {
              date: '2025-02-07',
              city: 'Sydney',
              hotel: 'Sheraton Grand Sydney Hyde Park',
              items: [
                'Manly Beach',
                'Sydney Opera House',
                'Observatory Hill'
              ]
            },
            {
              date: '2025-02-08',
              city: 'Sydney',
              hotel: '—',
              items: [
                'Fish Market、Sydney University',
                '机场还车',
                '返程航班：SYD-CAN CZ326；CAN-HGH CZ3849'
              ]
            }
          ]
        }
      ];

      var searchInput = document.getElementById('searchInput');
      var routesList = document.getElementById('routesList');
      var matchCount = document.getElementById('matchCount');
      var emptyState = document.getElementById('emptyState');
      var totalRoutes = document.getElementById('totalRoutes');
      var latestDate = document.getElementById('latestDate');
      var filterRow = document.getElementById('filterRow');
      var itineraryOverlay = document.getElementById('itineraryOverlay');
      var itineraryClose = document.getElementById('itineraryClose');
      var itineraryTitle = document.getElementById('itineraryTitle');
      var itinerarySubtitle = document.getElementById('itinerarySubtitle');
      var itineraryBody = document.getElementById('itineraryBody');

      function formatDate(d) {
        if (!d) return '-';
        var parts = d.split('-');
        if (parts.length !== 3) return d;
        return parts[0] + '年' + parts[1] + '月' + parts[2] + '日';
      }

      function initSummary() {
        totalRoutes.textContent = routes.length;
        if (!routes.length) {
          latestDate.textContent = '-';
          return;
        }
        var sorted = routes
          .slice()
          .filter(function(r) { return !!r.date; })
          .sort(function(a, b) {
            return (b.date || '').localeCompare(a.date || '');
          });
        latestDate.textContent = sorted.length ? formatDate(sorted[0].date) : '-';
      }

      function renderRoutes() {
        var keyword = (searchInput.value || '').trim().toLowerCase();
        var activeFilter = filterRow.querySelector('.chip.active')?.getAttribute('data-filter') || 'all';

        var filtered = routes.filter(function(r) {
          if (activeFilter !== 'all' && r.type !== activeFilter) return false;

          if (!keyword) return true;
          var haystack = [
            r.title,
            r.from,
            r.to,
            (r.id || ''),
            (r.note || ''),
            (r.tags || []).join(' ')
          ].join(' ').toLowerCase();
          return haystack.indexOf(keyword) !== -1;
        });

        routesList.innerHTML = '';

        if (!filtered.length) {
          emptyState.style.display = 'block';
          matchCount.textContent = '0 条结果';
        } else {
          emptyState.style.display = 'none';
          matchCount.textContent = filtered.length === routes.length
            ? '全部路线'
            : filtered.length + ' 条结果';

          filtered.forEach(function(r) {
            var card = document.createElement('article');
            card.className = 'route-card';
            if (r.itinerary && r.itinerary.length) card.classList.add('clickable');
            if (r.id) card.dataset.routeId = r.id;

            var title = document.createElement('div');
            title.className = 'route-main';
            title.innerHTML =
              '<div class="route-title">' + (r.title || '') + '</div>' +
              '<div class="route-sub">' +
              (r.from || '') + ' → ' + (r.to || '') +
              '</div>';

            var meta = document.createElement('div');
            meta.className = 'route-meta';
            meta.innerHTML =
              '<div class="meta-pill"><span class="label">天数</span><span class="value">' +
              (r.days || '-') +
              '</span></div>' +
              '<div class="meta-pill"><span class="label">里程</span><span class="value">' +
              (r.distance ? r.distance + ' km' : '-') +
              '</span></div>' +
              (r.id ? '<div class="meta-pill"><span class="label">编号</span><span class="value">' + r.id + '</span></div>' : '');

            var tags = document.createElement('div');
            tags.className = 'route-tags';
            (r.tags || []).forEach(function(t) {
              var span = document.createElement('span');
              span.className = 'route-tag';
              span.textContent = t;
              tags.appendChild(span);
            });

            var date = document.createElement('div');
            date.className = 'route-date';
            date.textContent = r.date ? formatDate(r.date) : '';

            var note = document.createElement('div');
            note.style.fontSize = '0.78rem';
            note.style.color = 'rgba(245,236,216,0.7)';
            note.textContent = r.note || '';

            var inner = document.createElement('div');
            inner.className = 'route-inner';
            inner.appendChild(title);
            inner.appendChild(meta);
            if ((r.tags || []).length) inner.appendChild(tags);
            if (r.note) inner.appendChild(note);

            card.appendChild(inner);
            card.appendChild(date);

            routesList.appendChild(card);
          });
        }
      }

      function openItinerary(route) {
        if (!route || !(route.itinerary && route.itinerary.length)) return;
        itineraryTitle.textContent = route.title || '行程';
        itinerarySubtitle.textContent = (route.from || '') + ' → ' + (route.to || '') + ' · ' + (route.days || '-') + ' 天';
        itineraryBody.innerHTML = '';

        route.itinerary.forEach(function(day) {
          var wrap = document.createElement('div');
          wrap.className = 'day-item';

          var top = document.createElement('div');
          top.className = 'day-top';

          var left = document.createElement('div');
          left.innerHTML =
            '<div class="day-date">' + formatDate(day.date) + '</div>' +
            '<div class="day-city">' + (day.city ? ('City：' + day.city) : '') + '</div>';

          var right = document.createElement('div');
          right.className = 'day-hotel';
          (function() {
            var hotelName = (day.hotel || '').trim();
            if (!hotelName || hotelName === '—') {
              right.innerHTML = '<strong>Hotel：</strong>—';
              return;
            }
            var query = (hotelName + ' ' + (day.city || '')).trim();
            var url = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(query);
            right.innerHTML =
              '<strong>Hotel：</strong>' +
              '<a href="' + url + '" target="_blank" rel="noopener noreferrer" ' +
              'style="color: rgba(215,178,130,0.95); text-decoration: none; border-bottom: 1px dashed rgba(215,178,130,0.55);">' +
              hotelName +
              '</a>';
          })();

          top.appendChild(left);
          top.appendChild(right);

          var ul = document.createElement('ul');
          ul.className = 'day-list';
          (day.items || []).forEach(function(txt) {
            var li = document.createElement('li');
            li.textContent = txt;
            ul.appendChild(li);
          });

          wrap.appendChild(top);
          if ((day.items || []).length) wrap.appendChild(ul);
          itineraryBody.appendChild(wrap);
        });

        itineraryOverlay.classList.add('active');
        itineraryOverlay.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
      }

      function closeItinerary() {
        itineraryOverlay.classList.remove('active');
        itineraryOverlay.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
      }

      routesList.addEventListener('click', function(e) {
        var card = e.target.closest('.route-card');
        if (!card) return;
        var id = card.dataset.routeId;
        if (!id) return;
        var route = routes.find(function(r) { return r.id === id; });
        if (route && route.itinerary && route.itinerary.length) {
          openItinerary(route);
        }
      });

      itineraryClose.addEventListener('click', function() {
        closeItinerary();
      });
      itineraryOverlay.addEventListener('click', function(e) {
        if (e.target === itineraryOverlay) closeItinerary();
      });
      window.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && itineraryOverlay.classList.contains('active')) closeItinerary();
      });

      searchInput.addEventListener('input', function() {
        renderRoutes();
      });

      filterRow.addEventListener('click', function(e) {
        var target = e.target.closest('.chip');
        if (!target) return;
        filterRow.querySelectorAll('.chip').forEach(function(btn) {
          btn.classList.toggle('active', btn === target);
        });
        renderRoutes();
      });

      initSummary();
      renderRoutes();
    })();
  </script>
</body>
</html>
