<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Road Trip Routes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Cormorant+Garamond:ital@0;1&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --book-width: 320px;
      --book-height: 420px;
      --page-color: #f5f7fb;
      --ink: #0f172a;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --accent-border: #bfdbfe;
      --bg-main: #e5edf8;
    }
    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, system-ui, -apple-system-body, 'SF Pro Text',
        'SF Pro Display', sans-serif;
      background: radial-gradient(circle at top, #f5f7fb 0%, #e4ecfb 45%, #d5e4ff 100%);
      color: var(--ink);
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 40px 16px 56px;
    }
    .app-shell {
      width: 100%;
      max-width: 1120px;
      background: radial-gradient(circle at top left, rgba(255,255,255,0.96), rgba(246,249,255,0.98));
      border-radius: 28px;
      border: 1px solid rgba(148,163,184,0.25);
      box-shadow:
        0 28px 80px rgba(15,23,42,0.18),
        0 0 0 0.5px rgba(255,255,255,0.9) inset;
      backdrop-filter: blur(26px);
      padding: 28px 22px 30px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }
    @media (min-width: 768px) {
      .app-shell { padding: 34px 40px 38px; }
    }
    .app-header {
      display: flex;
      flex-direction: column;
      gap: 18px;
      border-bottom: 1px solid rgba(226,232,240,0.9);
      padding-bottom: 18px;
    }
    .title-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .app-title {
      font-size: 1.6rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #020617;
      white-space: nowrap;
      font-weight: 500;
    }
    .app-subtitle {
      font-size: 0.98rem;
      color: rgba(71,85,105,0.9);
      letter-spacing: 0.04em;
    }
    .summary-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 18px;
      font-size: 0.82rem;
      color: rgba(100,116,139,0.95);
    }
    .summary-row span strong {
      color: #020617;
      font-weight: 500;
    }
    .search-bar {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }
    @media (min-width: 700px) {
      .search-bar {
        flex-direction: row;
        align-items: center;
      }
    }
    .search-input-wrap {
      position: relative;
      flex: 1;
      min-width: 0;
    }
    .search-input-wrap input {
      width: 100%;
      padding: 11px 40px 11px 32px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.55);
      background: rgba(248,250,252,0.88);
      color: #020617;
      font-size: 0.95rem;
      outline: none;
      transition: border 0.16s ease, box-shadow 0.18s ease, background 0.18s ease, transform 0.12s ease;
    }
    .search-input-wrap input::placeholder {
      color: rgba(148,163,184,0.95);
    }
    .search-input-wrap input:focus {
      border-color: rgba(37,99,235,0.98);
      box-shadow:
        0 0 0 1px rgba(59,130,246,0.9),
        0 10px 25px rgba(15,23,42,0.18);
      background: rgba(255,255,255,0.96);
      transform: translateY(-0.5px);
    }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.86rem;
      color: rgba(148,163,184,1);
      pointer-events: none;
    }
    .search-meta {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.78rem;
      color: rgba(148,163,184,0.95);
      pointer-events: none;
    }
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 0.8rem;
    }
    .chip {
      padding: 5px 13px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.45);
      background: rgba(255,255,255,0.9);
      color: rgba(51,65,85,0.9);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease, transform 0.12s ease,
        box-shadow 0.15s ease;
    }
    .chip span.dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: rgba(59,130,246,0.95);
    }
    .chip.active {
      background: var(--accent-soft);
      color: #1e3a8a;
      border-color: rgba(59,130,246,0.95);
      box-shadow: 0 6px 16px rgba(59,130,246,0.16);
      transform: translateY(-0.5px);
    }
    .chip[data-filter="all"] {
      border-style: dashed;
    }
    .layout-main {
      margin-top: 12px;
    }
    .routes-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .routes-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 8px;
      font-size: 0.9rem;
      color: rgba(71,85,105,0.95);
    }
    .routes-header strong {
      color: #0f172a;
    }
    .routes-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 22px;
      margin-top: 4px;
    }
    .route-card {
      position: relative;
      border-radius: 24px;
      padding: 0 0 16px;
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(226,232,240,0.9);
      box-shadow:
        0 18px 40px rgba(15,23,42,0.10),
        0 1px 0 rgba(255,255,255,0.9) inset;
      cursor: default;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: hidden;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border 0.18s ease, background 0.18s ease;
    }
    .route-card:hover {
      transform: translateY(-5px);
      box-shadow:
        0 26px 70px rgba(15,23,42,0.20),
        0 0 0 0.5px rgba(191,219,254,0.9);
      border-color: rgba(191,219,254,1);
      background: rgba(255,255,255,0.98);
    }
    .route-media {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background:
        radial-gradient(circle at 0% 0%, rgba(191,219,254,1), rgba(125,211,252,0.9)),
        linear-gradient(135deg, #dbeafe, #eff6ff);
    }
    .route-media img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(1.02) contrast(1.03);
    }
    .route-media::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(2,6,23,0.00) 0%, rgba(2,6,23,0.14) 65%, rgba(2,6,23,0.22) 100%);
      pointer-events: none;
    }
    .route-inner {
      padding: 14px 16px 10px;
    }
    .route-main {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .route-title {
      font-size: 1rem;
      color: #020617;
      letter-spacing: 0.02em;
    }
    .route-sub {
      font-size: 0.82rem;
      color: rgba(71,85,105,0.95);
    }
    .route-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      font-size: 0.8rem;
      color: rgba(71,85,105,0.95);
    }
    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(239,246,255,0.9);
      border: 1px solid rgba(191,219,254,0.9);
    }
    .meta-pill span.label {
      color: rgba(100,116,139,0.9);
    }
    .meta-pill span.value {
      color: #0f172a;
    }
    .route-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 2px;
      font-size: 0.74rem;
    }
    .route-tag {
      padding: 2px 7px;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid rgba(191,219,254,0.9);
    }
    .route-date {
      position: absolute;
      right: 12px;
      top: 10px;
      font-size: 0.72rem;
      color: rgba(100,116,139,0.95);
    }
    .empty-state {
      font-size: 0.86rem;
      color: rgba(245,236,216,0.7);
      padding: 16px 10px 8px;
    }
    .route-card.clickable { cursor: pointer; }
    .route-card.clickable::after {
      content: 'View itinerary';
      position: absolute;
      right: 12px;
      bottom: 10px;
      font-size: 0.74rem;
      color: rgba(37,99,235,0.9);
      border: 1px solid rgba(191,219,254,0.9);
      background: rgba(239,246,255,0.9);
      padding: 3px 8px;
      border-radius: 999px;
    }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.55);
      backdrop-filter: blur(8px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 50;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      width: min(980px, 100%);
      max-height: min(86vh, 920px);
      overflow: auto;
      border-radius: 16px;
      border: 1px solid rgba(191,219,254,0.9);
      background: radial-gradient(circle at top left, #eff6ff, #e0ecff);
      box-shadow: 0 22px 60px rgba(15,23,42,0.65);
      color: #0f172a;
    }
    .modal-media {
      margin: 12px 16px 0;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(191,219,254,0.9);
      background: #ffffff;
      box-shadow: 0 14px 34px rgba(15,23,42,0.12);
    }
    .modal-media img {
      display: block;
      width: 100%;
      height: auto;
    }
    .modal-actions {
      margin: 10px 16px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }
    .modal-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,0.6);
      background: rgba(255,255,255,0.92);
      color: rgba(30,64,175,1);
      text-decoration: none;
      font-size: 0.86rem;
      box-shadow: 0 10px 24px rgba(15,23,42,0.10);
      transition: transform 0.12s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      white-space: nowrap;
    }
    .modal-link:hover {
      transform: translateY(-0.5px);
      border-color: rgba(59,130,246,0.95);
      box-shadow: 0 14px 30px rgba(15,23,42,0.14);
      background: rgba(239,246,255,0.95);
    }
    .modal-header {
      position: sticky;
      top: 0;
      background: linear-gradient(180deg, rgba(239,246,255,0.96), rgba(219,234,254,0.9));
      border-bottom: 1px dashed rgba(148,163,184,0.5);
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .modal-title {
      font-size: 1rem;
      color: #0f172a;
    }
    .modal-subtitle {
      font-size: 0.82rem;
      color: rgba(71,85,105,0.95);
      margin-top: 4px;
      line-height: 1.5;
    }
    .modal-close {
      border: 1px solid rgba(148,163,184,0.6);
      background: rgba(255,255,255,0.9);
      color: rgba(30,64,175,1);
      border-radius: 10px;
      padding: 8px 10px;
      cursor: pointer;
      transition: border 0.15s ease, background 0.15s ease;
      white-space: nowrap;
    }
    .modal-close:hover {
      border-color: rgba(59,130,246,0.95);
      background: rgba(219,234,254,0.9);
    }
    .itinerary {
      padding: 10px 16px 16px;
      display: grid;
      gap: 10px;
    }
    .day-item {
      border: 1px solid rgba(209,213,219,0.9);
      background: rgba(255,255,255,0.95);
      border-radius: 14px;
      padding: 12px 12px 10px;
    }
    .day-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .day-date {
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
      color: #0f172a;
      font-size: 0.92rem;
    }
    .day-city {
      color: rgba(71,85,105,0.95);
      font-size: 0.82rem;
    }
    .day-hotel {
      font-size: 0.82rem;
      color: rgba(15,23,42,0.95);
    }
    .day-hotel strong { color: rgba(37,99,235,0.95); }
    .day-list {
      margin-top: 6px;
      padding-left: 18px;
      color: rgba(71,85,105,0.96);
      line-height: 1.6;
      font-size: 0.84rem;
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="title-row">
        <div class="app-title">ROAD · NOTES</div>
        <div class="app-subtitle">Road trip notebook</div>
      </div>
      <div class="summary-row">
        <span>Total <strong id="totalRoutes">0</strong> routes</span>
        <span>Latest departure: <strong id="latestDate">-</strong></span>
      </div>
      <div class="search-bar">
        <div class="search-input-wrap">
          <span class="search-icon">🔍</span>
          <input id="searchInput" type="search" placeholder="Search by origin / destination (e.g. Norway, Brisbane)" autocomplete="off">
          <span class="search-meta" id="matchCount">All routes</span>
        </div>
        <div class="filter-row" id="filterRow">
          <button class="chip active" data-filter="all"><span class="dot"></span>All</button>
          <button class="chip" data-filter="weekend">China</button>
          <button class="chip" data-filter="long">Europe</button>
          <button class="chip" data-filter="mountain">Australia</button>
          <button class="chip" data-filter="sea">New Zealand</button>
        </div>
      </div>
    </header>

    <main class="layout-main">
      <section class="routes-panel" aria-label="Road trip routes list">
        <div class="routes-header">
          <span><strong>Routes</strong> · Click a card to view itinerary</span>
        </div>
        <div id="routesList" class="routes-list"></div>
        <div id="emptyState" class="empty-state" style="display:none;">No matching routes. Try a different keyword, or add a new trip.</div>
      </section>
    </main>
  </div>

  <div class="modal-overlay" id="itineraryOverlay" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="itineraryTitle">
      <div class="modal-header">
        <div>
          <div class="modal-title" id="itineraryTitle">Itinerary</div>
          <div class="modal-subtitle" id="itinerarySubtitle"></div>
        </div>
        <button class="modal-close" type="button" id="itineraryClose">Close</button>
      </div>
      <div class="itinerary" id="itineraryBody"></div>
    </div>
  </div>

                'Oamaru: city walk, Little Blue Penguin viewing',
                'Drive back to Christchurch (about 3h)',
                'Flight: Christchurch → Guangzhou (CZ618) 22:30–05:30'
              ]
            },
            {
              date: '2024-02-13',
              city: 'Hangzhou',
              hotel: '—',
              items: [
                'Flight: Guangzhou → Hangzhou (CZ3521) 08:10–10:20'
              ]
            }
          ]
        }
      ];

      var searchInput = document.getElementById('searchInput');
      var routesList = document.getElementById('routesList');
      var matchCount = document.getElementById('matchCount');
      var emptyState = document.getElementById('emptyState');
      var totalRoutes = document.getElementById('totalRoutes');
      var latestDate = document.getElementById('latestDate');
      var filterRow = document.getElementById('filterRow');
      var itineraryOverlay = document.getElementById('itineraryOverlay');
      var itineraryClose = document.getElementById('itineraryClose');
      var itineraryTitle = document.getElementById('itineraryTitle');
      var itinerarySubtitle = document.getElementById('itinerarySubtitle');
      var itineraryBody = document.getElementById('itineraryBody');
      var googleMapsApiKey = '';

      function formatDate(d) {
        if (!d) return '-';
        var parsed = new Date(d + 'T00:00:00');
        if (isNaN(parsed.getTime())) return d;
        try {
          return new Intl.DateTimeFormat('en-US', { year: 'numeric', month: 'short', day: '2-digit' }).format(parsed);
        } catch (e) {
          return d;
        }
      }

      function initSummary() {
        totalRoutes.textContent = routes.length;
        if (!routes.length) {
          latestDate.textContent = '-';
          return;
        }
        var sorted = routes
          .slice()
          .filter(function(r) { return !!r.date; })
          .sort(function(a, b) {
            return (b.date || '').localeCompare(a.date || '');
          });
        latestDate.textContent = sorted.length ? formatDate(sorted[0].date) : '-';
      }

      function renderRoutes() {
        var keyword = (searchInput.value || '').trim().toLowerCase();
        var activeFilter = filterRow.querySelector('.chip.active')?.getAttribute('data-filter') || 'all';

        var filtered = routes.filter(function(r) {
          if (activeFilter !== 'all' && r.type !== activeFilter) return false;

          if (!keyword) return true;
          var haystack = [
            r.title,
            r.from,
            r.to,
            (r.id || ''),
            (r.note || ''),
            (r.tags || []).join(' ')
          ].join(' ').toLowerCase();
          return haystack.indexOf(keyword) !== -1;
        });

        routesList.innerHTML = '';

        if (!filtered.length) {
          emptyState.style.display = 'block';
          matchCount.textContent = '0 results';
        } else {
          emptyState.style.display = 'none';
          matchCount.textContent = filtered.length === routes.length
            ? 'All routes'
            : filtered.length + ' results';

          filtered.forEach(function(r) {
            var card = document.createElement('article');
            card.className = 'route-card';
            if (r.itinerary && r.itinerary.length) card.classList.add('clickable');
            if (r.id) card.dataset.routeId = r.id;

            var stops = getStopsForRoute(r);
            var directionsUrl = buildGoogleDirectionsUrl(stops);
            var staticMapUrl = r.previewImage ? r.previewImage : buildGoogleStaticMapUrl(stops);
            if (directionsUrl) card.dataset.directionsUrl = directionsUrl;

            var media = document.createElement('div');
            media.className = 'route-media';
            if (staticMapUrl) {
              var img = document.createElement('img');
              img.src = staticMapUrl;
              img.alt = 'Route preview';
              img.loading = 'lazy';
              media.appendChild(img);
            }

            var title = document.createElement('div');
            title.className = 'route-main';
            title.innerHTML =
              '<div class="route-title">' + (r.title || '') + '</div>' +
              '<div class="route-sub">' +
              (r.from || '') + ' → ' + (r.to || '') +
              '</div>';

            var meta = document.createElement('div');
            meta.className = 'route-meta';
            meta.innerHTML =
              '<div class="meta-pill"><span class="label">Days</span><span class="value">' +
              (r.days || '-') +
              '</span></div>' +
              '<div class="meta-pill"><span class="label">Distance</span><span class="value">' +
              (r.distance ? r.distance + ' km' : '-') +
              '</span></div>';

            var tags = document.createElement('div');
            tags.className = 'route-tags';
            (r.tags || []).forEach(function(t) {
              var span = document.createElement('span');
              span.className = 'route-tag';
              span.textContent = t;
              tags.appendChild(span);
            });

            var date = document.createElement('div');
            date.className = 'route-date';
            date.textContent = r.date ? formatDate(r.date) : '';

            var note = document.createElement('div');
            note.style.fontSize = '0.78rem';
            note.style.color = 'rgba(245,236,216,0.7)';
            note.textContent = r.note || '';

            var inner = document.createElement('div');
            inner.className = 'route-inner';
            inner.appendChild(title);
            inner.appendChild(meta);
            if ((r.tags || []).length) inner.appendChild(tags);
            if (r.note) inner.appendChild(note);

            card.appendChild(media);
            card.appendChild(inner);
            card.appendChild(date);

            routesList.appendChild(card);
          });
        }
      }

      function uniqConsecutive(arr) {
        var out = [];
        for (var i = 0; i < arr.length; i++) {
          var v = (arr[i] || '').trim();
          if (!v) continue;
          if (!out.length || out[out.length - 1] !== v) out.push(v);
        }
        return out;
      }

      function getStopsForRoute(route) {
        if (!route) return [];
        if (route.itinerary && route.itinerary.length) {
          var cities = route.itinerary.map(function(d) {
            var hotelName = (d.hotel || '').trim();
            if (!hotelName || hotelName === '—') return '';
            return d.city || '';
          });
          var uniq = uniqConsecutive(cities).filter(Boolean);
          if (uniq.length >= 2) return uniq;
        }
        var basic = [];
        if (route.from) basic.push(route.from);
        if (route.to) basic.push(route.to);
        return uniqConsecutive(basic);
      }

      function buildGoogleDirectionsUrl(stops) {
        if (!stops || stops.length < 2) return '';
        var origin = stops[0];
        var destination = stops[stops.length - 1];
        var waypoints = stops.slice(1, -1);
        var url =
          'https://www.google.com/maps/dir/?api=1' +
          '&travelmode=driving' +
          '&origin=' + encodeURIComponent(origin) +
          '&destination=' + encodeURIComponent(destination);
        if (waypoints.length) {
          url += '&waypoints=' + encodeURIComponent(waypoints.join('|'));
        }
        return url;
      }

      function buildGoogleStaticMapUrl(stops) {
        if (!stops || stops.length < 2) return '';
        // Google Static Maps typically requires a key. Leave empty and fill later to enable.
        var size = '1200x675';
        var scale = 2;
        var path = 'weight:5|color:0x2563EBff|' + stops.join('|');
        var markers = [
          'color:0x2563EB|label:S|' + stops[0],
          'color:0x2563EB|label:E|' + stops[stops.length - 1]
        ];
        for (var i = 1; i < stops.length - 1; i++) {
          markers.push('color:0x60A5FA|' + stops[i]);
        }
        var url =
          'https://maps.googleapis.com/maps/api/staticmap' +
          '?size=' + encodeURIComponent(size) +
          '&scale=' + encodeURIComponent(String(scale)) +
          '&maptype=roadmap' +
          '&format=png' +
          '&path=' + encodeURIComponent(path);
        markers.forEach(function(m) {
          url += '&markers=' + encodeURIComponent(m);
        });
        if (googleMapsApiKey) {
          url += '&key=' + encodeURIComponent(googleMapsApiKey);
        }
        return url;
      }

      function openItinerary(route) {
        if (!route || !(route.itinerary && route.itinerary.length)) return;
        itineraryTitle.textContent = route.title || 'Itinerary';
        itinerarySubtitle.textContent = (route.from || '') + ' → ' + (route.to || '') + ' · ' + (route.days || '-') + ' days';
        itineraryBody.innerHTML = '';

        var stops = getStopsForRoute(route);
        var directionsUrl = buildGoogleDirectionsUrl(stops);
        var staticMapUrl = route.previewImage ? route.previewImage : buildGoogleStaticMapUrl(stops);
        if (staticMapUrl) {
          var mediaWrap = document.createElement('div');
          mediaWrap.className = 'modal-media';
          var img = document.createElement('img');
          img.src = staticMapUrl;
          img.alt = 'Route preview';
          img.loading = 'lazy';
          mediaWrap.appendChild(img);
          itineraryBody.appendChild(mediaWrap);
        }
        if (directionsUrl) {
          var actions = document.createElement('div');
          actions.className = 'modal-actions';
          var link = document.createElement('a');
          link.className = 'modal-link';
          link.href = directionsUrl;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.textContent = 'Open driving route in Google Maps';
          actions.appendChild(link);
          itineraryBody.appendChild(actions);
        }

        route.itinerary.forEach(function(day) {
          var wrap = document.createElement('div');
          wrap.className = 'day-item';

          var top = document.createElement('div');
          top.className = 'day-top';

          var left = document.createElement('div');
          left.innerHTML =
            '<div class="day-date">' + formatDate(day.date) + '</div>' +
            '<div class="day-city">' + (day.city ? ('City: ' + day.city) : '') + '</div>';

          var right = document.createElement('div');
          right.className = 'day-hotel';
          (function() {
            var hotelName = (day.hotel || '').trim();
            if (!hotelName || hotelName === '—') {
              right.innerHTML = '<strong>Hotel: </strong>—';
              return;
            }
            var query = (hotelName + ' ' + (day.city || '')).trim();
            var url = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(query);
            right.innerHTML =
              '<strong>Hotel: </strong>' +
              '<a href="' + url + '" target="_blank" rel="noopener noreferrer" ' +
              'style="color: rgba(215,178,130,0.95); text-decoration: none; border-bottom: 1px dashed rgba(215,178,130,0.55);">' +
              hotelName +
              '</a>';
          })();

          top.appendChild(left);
          top.appendChild(right);

          var ul = document.createElement('ul');
          ul.className = 'day-list';
          (day.items || []).forEach(function(txt) {
            var li = document.createElement('li');
            li.textContent = txt;
            ul.appendChild(li);
          });

          wrap.appendChild(top);
          if ((day.items || []).length) wrap.appendChild(ul);
          itineraryBody.appendChild(wrap);
        });

        itineraryOverlay.classList.add('active');
        itineraryOverlay.setAttribute('aria-hidden', 'false');
        document.body.style.overflow = 'hidden';
      }

      function closeItinerary() {
        itineraryOverlay.classList.remove('active');
        itineraryOverlay.setAttribute('aria-hidden', 'true');
        document.body.style.overflow = '';
      }

      routesList.addEventListener('click', function(e) {
        var card = e.target.closest('.route-card');
        if (!card) return;
        var id = card.dataset.routeId;
        if (!id) return;
        var route = routes.find(function(r) { return r.id === id; });
        if (route && route.itinerary && route.itinerary.length) {
          openItinerary(route);
        }
      });

      itineraryClose.addEventListener('click', function() {
        closeItinerary();
      });
      itineraryOverlay.addEventListener('click', function(e) {
        if (e.target === itineraryOverlay) closeItinerary();
      });
      window.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && itineraryOverlay.classList.contains('active')) closeItinerary();
      });

      searchInput.addEventListener('input', function() {
        renderRoutes();
      });

      filterRow.addEventListener('click', function(e) {
        var target = e.target.closest('.chip');
        if (!target) return;
        filterRow.querySelectorAll('.chip').forEach(function(btn) {
          btn.classList.toggle('active', btn === target);
        });
        renderRoutes();
      });

      initSummary();
      renderRoutes();
    })();
  </script>
</body>
</html>
